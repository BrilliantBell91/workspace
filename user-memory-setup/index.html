<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카운터 앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="root" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="bg-white rounded-lg shadow-2xl p-8 w-80">
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
        카운터
      </h1>

      <!-- 카운트 표시 -->
      <div id="count" class="text-6xl font-bold text-center text-indigo-600 mb-8">
        0
      </div>

      <!-- 버튼 영역 -->
      <div class="flex gap-3 mb-4">
        <button
          id="decrement"
          class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105"
        >
          −
        </button>

        <button
          id="increment"
          class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105"
        >
          +
        </button>
      </div>

      <!-- 초기화 버튼 -->
      <button
        id="reset"
        class="w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-lg transition duration-200"
      >
        초기화
      </button>
    </div>
  </div>

  <script>
    let count = 0;
    const countDisplay = document.getElementById('count');

    // 숫자 증가
    document.getElementById('increment').addEventListener('click', () => {
      count++;
      countDisplay.textContent = count;
    });

    // 숫자 감소
    document.getElementById('decrement').addEventListener('click', () => {
      count--;
      countDisplay.textContent = count;
    });

    // 카운터 초기화
    document.getElementById('reset').addEventListener('click', () => {
      count = 0;
      countDisplay.textContent = count;
    });
  </script>
</body>
</html>
