<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투두 리스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            font-size: 28px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: #f0f0f0;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed span {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            color: #333;
            font-size: 14px;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ee5a52;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 투두 리스트</h1>

        <div class="input-group">
            <input
                type="text"
                id="todoInput"
                placeholder="새로운 작업을 입력하세요..."
                autocomplete="off"
            >
            <button onclick="addTodo()">추가</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>
        <div class="empty-message" id="emptyMessage">아직 할 일이 없습니다!</div>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const emptyMessage = document.getElementById('emptyMessage');

        // 로컬 스토리지에서 데이터 로드
        function loadTodos() {
            const saved = localStorage.getItem('todos');
            return saved ? JSON.parse(saved) : [];
        }

        // 로컬 스토리지에 데이터 저장
        function saveTodos(todos) {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // 투두 추가
        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) {
                alert('작업을 입력하세요.');
                return;
            }

            const todos = loadTodos();
            todos.push({ id: Date.now(), text, completed: false });
            saveTodos(todos);
            todoInput.value = '';
            render();
        }

        // 투두 삭제
        function deleteTodo(id) {
            const todos = loadTodos();
            const filtered = todos.filter(todo => todo.id !== id);
            saveTodos(filtered);
            render();
        }

        // 투두 완료 토글
        function toggleTodo(id) {
            const todos = loadTodos();
            todos.forEach(todo => {
                if (todo.id === id) todo.completed = !todo.completed;
            });
            saveTodos(todos);
            render();
        }

        // 화면 렌더링
        function render() {
            const todos = loadTodos();
            todoList.innerHTML = '';

            if (todos.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }

            emptyMessage.style.display = 'none';
            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input
                        type="checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">삭제</button>
                `;
                todoList.appendChild(li);
            });
        }

        // XSS 방지를 위한 HTML 이스케이프
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 엔터 키로 추가
        todoInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') addTodo();
        });

        // 초기 렌더링
        render();
    </script>
</body>
</html>
