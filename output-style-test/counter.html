<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <!-- Tailwind CSS를 인터넷에서 가져오기 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <!-- 전체 컨테이너: 화면 중앙에 배치 -->
    <div class="bg-white rounded-lg shadow-lg p-8 w-80">
        <!-- 제목 -->
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
            카운터
        </h1>

        <!-- 카운트 숫자 표시 영역 -->
        <!-- id="counter"로 이 요소를 JavaScript에서 찾을 수 있게 함 -->
        <div class="bg-blue-50 rounded-lg p-8 mb-8 text-center">
            <p class="text-gray-600 text-sm mb-2">현재 카운트</p>
            <p id="counter" class="text-6xl font-bold text-blue-600">
                0
            </p>
        </div>

        <!-- 버튼 영역 -->
        <div class="space-y-3">
            <!-- 증가 버튼: +1 클릭 시 증가 -->
            <button
                onclick="increaseCounter()"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105">
                +1 증가
            </button>

            <!-- 감소 버튼: -1 클릭 시 감소 -->
            <button
                onclick="decreaseCounter()"
                class="w-full bg-blue-400 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105">
                -1 감소
            </button>

            <!-- 리셋 버튼: 0으로 초기화 -->
            <button
                onclick="resetCounter()"
                class="w-full bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105">
                리셋
            </button>
        </div>
    </div>

    <!-- JavaScript 코드 -->
    <script>
        // 현재 카운트를 저장하는 변수
        // 이 변수에 숫자를 저장하고, 버튼을 클릭할 때마다 값을 변경합니다
        let count = 0;

        // 증가 함수: 카운트를 1 증가시키고 화면에 업데이트
        function increaseCounter() {
            count = count + 1;  // 카운트에 1을 더함
            updateDisplay();    // 화면 업데이트
        }

        // 감소 함수: 카운트를 1 감소시키고 화면에 업데이트
        function decreaseCounter() {
            count = count - 1;  // 카운트에서 1을 뺌
            updateDisplay();    // 화면 업데이트
        }

        // 리셋 함수: 카운트를 0으로 초기화하고 화면에 업데이트
        function resetCounter() {
            count = 0;          // 카운트를 0으로 설정
            updateDisplay();    // 화면 업데이트
        }

        // 화면 업데이트 함수: HTML에서 id="counter"인 요소를 찾아 숫자를 업데이트
        function updateDisplay() {
            // getElementById: id가 "counter"인 HTML 요소를 찾음
            // textContent: 그 요소 안의 텍스트를 변경
            document.getElementById("counter").textContent = count;
        }
    </script>
</body>
</html>
